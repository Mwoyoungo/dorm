<style>
  body { min-height: max(884px, 100dvh); }

  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  .topbar-glass { background: rgba(14,14,14,0.82); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
  .nav-glass { background: rgba(26,25,25,0.85); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
  .glass-action { background: rgba(255,255,255,0.13); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  .intent-pill { background: rgba(0,0,0,0.55); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .proximity-pill { background: rgba(255,255,255,0.10); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }

  /* Status bar - WhatsApp vibe */
  .status-bar { background: rgba(0,0,0,0.60); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }

  /* Context switcher */
  .ctx-active { background: linear-gradient(135deg,#FF6B35,#F04E30); color:#fff; box-shadow: 0 0 14px rgba(255,107,53,0.40); }
  .ctx-inactive { background: #262626; color: #adaaaa; }

  /* Filter pills */
  .fp-active { background: linear-gradient(135deg,#FF6B35,#F04E30); color:#fff; }
  .fp-inactive { background: #262626; color: #adaaaa; }

  /* Filter popover sheet */
  #filter-sheet {
    position: fixed; inset: 0; z-index: 90;
    display: flex; flex-direction: column; justify-content: flex-end;
    pointer-events: none;
  }
  #filter-sheet.open { pointer-events: all; }

  #filter-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
    opacity: 0; transition: opacity 0.25s ease;
  }
  #filter-sheet.open #filter-backdrop { opacity: 1; }

  #filter-panel {
    position: relative; z-index: 1;
    background: #131313; border-radius: 28px 28px 0 0;
    padding: 24px 20px 40px;
    transform: translateY(100%); transition: transform 0.30s cubic-bezier(0.32,0,0.18,1);
    max-width: 448px; width: 100%; margin: 0 auto;
  }
  #filter-sheet.open #filter-panel { transform: translateY(0); }

  /* Card stack */
  .card-wrap { position: relative; width: 100%; height: 560px; touch-action: none; }

  .card-slot { position: absolute; inset: 0; border-radius: 40px; overflow: hidden; will-change: transform; transition: transform 0.3s ease, opacity 0.3s ease; }
  .card-slot.c3 { transform: scale(0.88) translateY(24px); opacity: 0.35; filter: blur(2px); z-index: 1; }
  .card-slot.c2 { transform: scale(0.94) translateY(12px); opacity: 0.65; z-index: 2; }
  .card-slot.c1 { transform: scale(1) translateY(0); opacity: 1; z-index: 3; cursor: grab; }
  .card-slot.c1:active { cursor: grabbing; }

  /* Swipe labels */
  .swipe-label-connect {
    position: absolute; top: 28px; left: 20px; z-index: 10;
    border: 3px solid #4ade80; color: #4ade80;
    font-family: 'Plus Jakarta Sans'; font-weight: 900; font-size: 22px;
    letter-spacing: 0.12em; padding: 4px 14px; border-radius: 8px;
    opacity: 0; transform: rotate(-15deg); pointer-events: none;
    text-shadow: 0 0 12px rgba(74,222,128,0.5);
  }
  .swipe-label-pass {
    position: absolute; top: 28px; right: 20px; z-index: 10;
    border: 3px solid #f87171; color: #f87171;
    font-family: 'Plus Jakarta Sans'; font-weight: 900; font-size: 22px;
    letter-spacing: 0.12em; padding: 4px 14px; border-radius: 8px;
    opacity: 0; transform: rotate(15deg); pointer-events: none;
    text-shadow: 0 0 12px rgba(248,113,113,0.5);
  }
  .swipe-label-vibe {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    z-index: 10; border: 3px solid #a78bfa; color: #a78bfa;
    font-family: 'Plus Jakarta Sans'; font-weight: 900; font-size: 22px;
    letter-spacing: 0.12em; padding: 4px 14px; border-radius: 8px;
    opacity: 0; pointer-events: none;
    text-shadow: 0 0 12px rgba(167,139,250,0.5);
  }

  /* Action buttons */
  .connect-btn {
    background: linear-gradient(135deg,#FF6B35,#F04E30);
    box-shadow: 0 0 26px rgba(255,107,53,0.55), 0 4px 16px rgba(240,78,48,0.30);
  }
  .vibe-btn { background: rgba(167,139,250,0.18); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .join-btn { background: rgba(74,222,128,0.15); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }

  /* Button pulse */
  @keyframes btn-pulse { 0%{transform:scale(1)} 40%{transform:scale(0.85)} 70%{transform:scale(1.10)} 100%{transform:scale(1)} }
  .btn-pulse { animation: btn-pulse 0.30s ease-out forwards; }

  /* Fly-off animations */
  @keyframes fly-right { to { transform: translateX(120%) rotate(30deg); opacity: 0; } }
  @keyframes fly-left  { to { transform: translateX(-120%) rotate(-30deg); opacity: 0; } }
  @keyframes fly-up    { to { transform: translateY(-120%) scale(0.8); opacity: 0; } }
  .fly-right { animation: fly-right 0.42s ease-in forwards; }
  .fly-left  { animation: fly-left  0.42s ease-in forwards; }
  .fly-up    { animation: fly-up    0.42s ease-in forwards; }

  /* Promote cards in */
  @keyframes promote-c2 { from { transform: scale(0.94) translateY(12px); opacity: 0.65; } to { transform: scale(1) translateY(0); opacity: 1; } }
  @keyframes promote-c3 { from { transform: scale(0.88) translateY(24px); opacity: 0.35; filter:blur(2px); } to { transform: scale(0.94) translateY(12px); opacity: 0.65; filter:blur(0); } }

  /* Toast */
  #toast {
    position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(26,25,25,0.95); backdrop-filter: blur(16px);
    color: #fff; font-family: 'Inter'; font-size: 13px; font-weight: 600;
    padding: 10px 20px; border-radius: 999px;
    opacity: 0; transition: opacity 0.25s, transform 0.25s;
    pointer-events: none; z-index: 200; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Empty state */
  #empty-state { display: none; flex-direction: column; align-items: center; justify-content: center; height: 560px; gap: 12px; }

  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* gradient text */
  .grad-text { background: linear-gradient(135deg,#FF6B35,#F04E30); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

  /* Profile dot indicator */
  .dot-active { background: linear-gradient(135deg,#FF6B35,#F04E30); }
  .dot-inactive { background: rgba(255,255,255,0.25); }
</style>

const slot1 = document.getElementById('slot-c1');
const slot2 = document.getElementById('slot-c2');
const slot3 = document.getElementById('slot-c3');
const lblConnect = document.getElementById('lbl-connect');
const lblPass    = document.getElementById('lbl-pass');
const lblVibe    = document.getElementById('lbl-vibe');
const emptyState = document.getElementById('empty-state');
const photoDots  = document.getElementById('photo-dots');
const bioText    = document.getElementById('bio-text');
const statCards  = document.getElementById('stat-cards');

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
function renderCard(slotEl, profileIdx, slotClass) {
  if (profileIdx >= profiles.length) {
    slotEl.innerHTML = '';
    slotEl.style.visibility = 'hidden';
    return;
  }
  slotEl.style.visibility = 'visible';
  const p = profiles[profileIdx];

  if (slotClass === 'c1') {
    slotEl.innerHTML = `
      <div class="swipe-label-connect" id="lbl-connect">CONNECT</div>
      <div class="swipe-label-pass"    id="lbl-pass">PASS</div>
      <div class="swipe-label-vibe"    id="lbl-vibe">VIBE ✦</div>

      <div class="w-full h-full relative" style="background:${p.color || '#1a1919'};">

        ${p.photo
          ? `<img src="${p.photo}" alt="${p.name}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;" draggable="false"/>`
          : `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;"><span class="material-symbols-outlined" style="font-size:96px;color:rgba(255,255,255,0.07);">person</span></div>`
        }

        <!-- Bottom gradient — deep enough for text legibility -->
        <div style="position:absolute;inset-x:0;bottom:0;height:55%;background:linear-gradient(to top,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.5) 50%,transparent 100%);"></div>

        <!-- Top row: res badge + photo count -->
        <div style="position:absolute;top:16px;left:16px;right:16px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
          <div class="proximity-pill" style="display:flex;align-items:center;gap:4px;padding:4px 12px;border-radius:999px;flex-shrink:0;">
            <span class="material-symbols-outlined" style="font-size:12px;color:rgba(255,255,255,0.7);">apartment</span>
            <span style="color:rgba(255,255,255,0.85);font-size:11px;font-weight:500;font-family:Inter;">${p.res}</span>
          </div>
          <div class="proximity-pill" style="display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;">
            <span class="material-symbols-outlined" style="font-size:12px;color:rgba(255,255,255,0.6);">photo_library</span>
            <span style="color:rgba(255,255,255,0.65);font-size:11px;font-family:Inter;">${p.photoCount}</span>
          </div>
        </div>

        <!-- Status bar — WhatsApp vibe -->
        <div style="position:absolute;top:52px;left:16px;right:16px;">
          <div class="status-bar" style="border-radius:999px;padding:6px 14px;display:flex;align-items:center;gap:8px;">
            <span style="width:7px;height:7px;border-radius:999px;background:#4ade80;flex-shrink:0;"></span>
            <span style="color:rgba(255,255,255,0.88);font-size:12px;font-family:Inter;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.status}</span>
          </div>
        </div>

        <!-- Bottom: name + intents only -->
        <div style="position:absolute;bottom:20px;left:20px;right:68px;">
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
            ${p.intents.map(i => `<span class="intent-pill" style="color:#fff;font-size:11px;font-family:Inter;font-weight:500;padding:4px 10px;border-radius:999px;">${i}</span>`).join('')}
          </div>
          <h2 style="color:#fff;font-family:'Plus Jakarta Sans';font-size:28px;font-weight:700;line-height:1.1;letter-spacing:-0.02em;margin:0;">${p.name}, ${p.age}</h2>
        </div>

        <!-- Side action bar -->
        <div style="position:absolute;right:12px;bottom:20px;display:flex;flex-direction:column;align-items:center;gap:12px;">
          <button class="glass-action" style="width:44px;height:44px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#fff;border:none;cursor:pointer;transition:transform 0.15s;" onclick="triggerWave()" title="Wave" onmousedown="this.style.transform='scale(0.88)'" onmouseup="this.style.transform='scale(1)'" ontouchstart="this.style.transform='scale(0.88)'" ontouchend="this.style.transform='scale(1)'">
            <span class="material-symbols-outlined" style="font-size:19px;">waving_hand</span>
          </button>
          <button class="connect-btn" style="width:56px;height:56px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#fff;border:none;cursor:pointer;transition:transform 0.15s;" onclick="triggerConnect()" title="Connect" onmousedown="this.style.transform='scale(0.88)'" onmouseup="this.style.transform='scale(1)'" ontouchstart="this.style.transform='scale(0.88)'" ontouchend="this.style.transform='scale(1)'">
            <span class="material-symbols-outlined icon-filled" style="font-size:24px;">favorite</span>
          </button>
          <button class="join-btn" style="width:44px;height:44px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#4ade80;border:none;cursor:pointer;transition:transform 0.15s;" onclick="triggerJoin()" title="Join" onmousedown="this.style.transform='scale(0.88)'" onmouseup="this.style.transform='scale(1)'" ontouchstart="this.style.transform='scale(0.88)'" ontouchend="this.style.transform='scale(1)'">
            <span class="material-symbols-outlined" style="font-size:19px;">group_add</span>
          </button>
          <button class="vibe-btn" style="width:44px;height:44px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#a78bfa;border:none;cursor:pointer;transition:transform 0.15s;" onclick="triggerVibe()" title="Vibe" onmousedown="this.style.transform='scale(0.88)'" onmouseup="this.style.transform='scale(1)'" ontouchstart="this.style.transform='scale(0.88)'" ontouchend="this.style.transform='scale(1)'">
            <span class="material-symbols-outlined" style="font-size:19px;">auto_awesome</span>
          </button>
        </div>
      </div>
    `;
    // re-grab label refs after re-render
    setupSwipe();
    updateBio(p);
    renderDots(p);
  } else {
    const nextP = profiles[profileIdx];
    slotEl.innerHTML = `
      <div style="width:100%;height:100%;position:relative;background:${nextP?.color || '#131313'};">
        ${nextP?.photo ? `<img src="${nextP.photo}" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;" draggable="false"/>` : ''}
        <div style="position:absolute;inset-x:0;bottom:0;height:50%;background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);"></div>
        <div style="position:absolute;bottom:24px;left:20px;">
          <div style="width:80px;height:10px;border-radius:999px;background:rgba(255,255,255,0.08);margin-bottom:8px;"></div>
          <div style="width:56px;height:8px;border-radius:999px;background:rgba(255,255,255,0.04);"></div>
        </div>
      </div>
    `;
  }
}

function updateBio(p) {
  bioText.textContent = p.vibe;
  statCards.innerHTML = p.stats.map(s => `
    <div class="bg-surface-container-low flex-1 p-4 rounded-[20px] flex flex-col items-center gap-1.5">
      <span class="material-symbols-outlined text-primary" style="font-size:19px;">${s.icon}</span>
      <span class="text-[11px] text-on-surface-variant font-label font-medium text-center">${s.label}</span>
      <span class="text-[10px] text-on-surface-variant/45 font-label">${s.sub}</span>
    </div>
  `).join('');
}

function renderDots(p) {
  photoDots.innerHTML = Array.from({length: p.photoCount}, (_, i) =>
    `<div class="w-1.5 h-1.5 rounded-full ${i === 0 ? 'dot-active w-4' : 'dot-inactive'} transition-all duration-300"></div>`
  ).join('');
}

function initCards() {
  slot1.style.visibility = 'visible';
  slot2.style.visibility = 'visible';
  slot3.style.visibility = 'visible';
  emptyState.style.display = 'none';
  renderCard(slot1, currentIndex,     'c1');
  renderCard(slot2, currentIndex + 1, 'c2');
  renderCard(slot3, currentIndex + 2, 'c3');
}

// ─────────────────────────────────────────────────────────────
// SWIPE DRAG
// ─────────────────────────────────────────────────────────────
function setupSwipe() {
  slot1.addEventListener('mousedown',  onDragStart, { passive: true });
  slot1.addEventListener('touchstart', onDragStart, { passive: true });
  window.addEventListener('mousemove',  onDragMove, { passive: true });
  window.addEventListener('touchmove',  onDragMove, { passive: true });
  window.addEventListener('mouseup',   onDragEnd);
  window.addEventListener('touchend',  onDragEnd);
}

function onDragStart(e) {
  if (currentIndex >= profiles.length) return;
  isDragging = true;
  const pt = e.touches ? e.touches[0] : e;
  startX = pt.clientX; startY = pt.clientY;
  slot1.style.transition = 'none';
}

function onDragMove(e) {
  if (!isDragging) return;
  const pt = e.touches ? e.touches[0] : e;
  currentX = pt.clientX - startX;
  currentY = pt.clientY - startY;

  const rot = currentX * 0.08;
  slot1.style.transform = `translateX(${currentX}px) translateY(${currentY}px) rotate(${rot}deg)`;

  // swipe labels
  const threshX = 60, threshY = -80;
  const lc = document.getElementById('lbl-connect');
  const lp = document.getElementById('lbl-pass');
  const lv = document.getElementById('lbl-vibe');
  if (lc) lc.style.opacity = currentX > threshX ? Math.min((currentX - threshX) / 60, 1) : 0;
  if (lp) lp.style.opacity = currentX < -threshX ? Math.min((-currentX - threshX) / 60, 1) : 0;
  if (lv) lv.style.opacity = currentY < threshY ? Math.min((-currentY + threshY) / 60, 1) : 0;
}

function onDragEnd() {
  if (!isDragging) return;
  isDragging = false;
  slot1.style.transition = 'transform 0.3s ease, opacity 0.3s ease';

  const THRESH_X = 100, THRESH_Y = -100;
  if (currentX > THRESH_X)       { triggerConnect(); }
  else if (currentX < -THRESH_X) { triggerPass(); }
  else if (currentY < THRESH_Y)  { triggerVibe(); }
  else {
    // snap back
    slot1.style.transform = 'scale(1) translateY(0)';
    const lc = document.getElementById('lbl-connect');
    const lp = document.getElementById('lbl-pass');
    const lv = document.getElementById('lbl-vibe');
    if (lc) lc.style.opacity = 0;
    if (lp) lp.style.opacity = 0;
    if (lv) lv.style.opacity = 0;
  }
  currentX = 0; currentY = 0;
}

// ─────────────────────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────────────────────
function pulsebtn(id) {
  const b = document.getElementById(id);
  if (!b) return;
  b.classList.remove('btn-pulse');
  void b.offsetWidth;
  b.classList.add('btn-pulse');
  setTimeout(() => b.classList.remove('btn-pulse'), 350);
}

function advanceCards(flyClass, toastMsg) {
  if (currentIndex >= profiles.length) return;
  pulsebtn('btn-' + (flyClass === 'fly-right' ? 'connect' : flyClass === 'fly-left' ? 'pass' : flyClass === 'fly-up' ? 'vibe' : 'wave'));

  // Hide labels
  const lc = document.getElementById('lbl-connect');
  const lp = document.getElementById('lbl-pass');
  const lv = document.getElementById('lbl-vibe');
  if (lc) { lc.style.opacity = flyClass === 'fly-right' ? 1 : 0; }
  if (lp) { lp.style.opacity = flyClass === 'fly-left'  ? 1 : 0; }
  if (lv) { lv.style.opacity = flyClass === 'fly-up'    ? 1 : 0; }

  slot1.classList.add(flyClass);
  showToast(toastMsg);

  setTimeout(() => {
    currentIndex++;
    slot1.classList.remove(flyClass);
    slot1.style.transform = 'scale(1) translateY(0)';
    slot1.style.transition = '';

    if (currentIndex >= profiles.length) {
      // All swiped
      slot1.innerHTML = '';
      slot2.innerHTML = '';
      slot3.innerHTML = '';
      slot1.style.visibility = 'hidden';
      slot2.style.visibility = 'hidden';
      slot3.style.visibility = 'hidden';
      emptyState.style.display = 'flex';
      photoDots.innerHTML = '';
      bioText.textContent = '';
      statCards.innerHTML = '';
      return;
    }

    renderCard(slot1, currentIndex,     'c1');
    renderCard(slot2, currentIndex + 1, 'c2');
    renderCard(slot3, currentIndex + 2, 'c3');
  }, 440);
}

function triggerConnect() { advanceCards('fly-right', `💛 Connected with ${profiles[currentIndex]?.name}!`); }
function triggerPass()    { advanceCards('fly-left',  `Passed`); }
function triggerVibe()    { advanceCards('fly-up',    `✨ Vibed with ${profiles[currentIndex]?.name}!`); }

function triggerWave() {
  pulsebtn('btn-wave');
  showToast(`👋 Waved at ${profiles[currentIndex]?.name}`);
  // wave doesn't advance — it's a soft non-committal hello
  setTimeout(() => advanceCards('fly-right', `👋 Wave sent!`), 400);
}

function triggerJoin() {
  pulsebtn('btn-join');
  const p = profiles[currentIndex];
  if (p) showToast(`🟢 Joining ${p.name}'s plan!`);
  setTimeout(() => advanceCards('fly-right', `You're in!`), 400);
}

// ─────────────────────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────────────────────
function setContext(clicked) {
  // only toggle within same group (ctx)
  clicked.closest('div').querySelectorAll('.ctx-active,.ctx-inactive').forEach(el => {
    el.classList.replace('ctx-active','ctx-inactive');
  });
  clicked.classList.replace('ctx-inactive','ctx-active');
}

function setFilter(clicked) {
  clicked.closest('div').querySelectorAll('.fp-active,.fp-inactive').forEach(el => {
    el.classList.replace('fp-active','fp-inactive');
  });
  clicked.classList.replace('fp-inactive','fp-active');
}

function openFilterSheet() {
  document.getElementById('filter-sheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeFilterSheet() {
  document.getElementById('filter-sheet').classList.remove('open');
  document.body.style.overflow = '';
  // read active selections and show toast
  const ctx = document.querySelector('#filter-panel .ctx-active')?.textContent?.trim() || '';
  const flt = document.querySelector('#filter-panel .fp-active')?.textContent?.trim() || '';
  showToast(`${ctx} · ${flt}`);
}

function handleSheetClick(e) {
  if (e.target === document.getElementById('filter-backdrop')) closeFilterSheet();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function resetCards() {
  currentIndex = 0;
  initCards();
}

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
initCards();
</script>
</body>
</html>
